name: Build and Release

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-release:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Extract info
        id: info
        env:
          PR_BODY: ${{ github.event.pull_request.body || 'VERSION: 1.0.0' }}
        run: |
          # Flexible Regex for SemVer (X.Y.Z) from PR Body
          VERSION=$(echo "$PR_BODY" | grep -ioP '(?m)^[*-]?\s*VERSION\s*:\s*[vV]?\K\d+\.\d+\.\d+' | head -1)
          
          # If manual dispatch or missing in PR, fallback to manifest
          if [ -z "$VERSION" ]; then
            # Quote-agnostic extraction from fxmanifest
            VERSION=$(grep -ioP "version\s+['\"]\K[^'\"]+" fxmanifest.lua | head -1)
          fi

          if [ -z "$VERSION" ]; then
            echo "❌ Error: Could not extract version."
            exit 1
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          # Quote-agnostic SCRIPT_NAME extraction
          SCRIPT_NAME=$(grep -ioP "name\s+['\"]\K[^'\"]+" fxmanifest.lua | head -1 | tr ' ' '-')
          [ -z "$SCRIPT_NAME" ] && SCRIPT_NAME=${{ github.event.repository.name }}
          echo "script_name=$SCRIPT_NAME" >> $GITHUB_OUTPUT

      - name: Build NUI
        run: |
          if [ -f "web/package.json" ]; then
            echo "Building NUI..."
            cd web
            npm ci || npm install
            npm run build
          else
            echo "No NUI found, skipping build."
          fi

      - name: Generate Release Assets (Manifest & Changelog)
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: python3 .github/scripts/release_engine.py ${{ steps.info.outputs.version }}

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fxmanifest.lua CHANGELOG.md
          git commit -m "chore: release v${{ steps.info.outputs.version }} [skip ci]" || echo "Nothing to commit"
          git push origin main

      - name: Tag the release
        run: |
          git tag v${{ steps.info.outputs.version }}
          git push origin v${{ steps.info.outputs.version }}

      - name: Sync Main to Develop and Staging
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          # We need to fetch all branches
          git fetch origin develop staging
          
          for branch in develop staging; do
            echo "Attempting to sync main back to $branch..."
            git checkout $branch
            if git merge origin/main --no-edit; then
              git push origin $branch
              echo "✅ Successfully synced main to $branch"
            else
              echo "⚠️ Conflicts detected syncing to $branch. Creating Sync PR..."
              git merge --abort
              
              # Check if a sync PR already exists to avoid spam
              EXISTING_PR=$(gh pr list --base $branch --head main --state open --json number -q '.[0].number')
              if [ -z "$EXISTING_PR" ]; then
                gh pr create \
                  --base $branch \
                  --head main \
                  --title "chore: sync main to $branch (Manual Resolution Required)" \
                  --body "Automated sync from \`main\` failed due to conflicts. This usually happens after a Hotfix. Please resolve manually to keep branches in sync."
              else
                echo "Sync PR already exists: #$EXISTING_PR"
              fi
            fi
          done
          # Switch back to main for packaging steps
          git checkout main

      - name: Package Resource
        run: |
          VERSION=${{ steps.info.outputs.version }}
          SCRIPT_NAME=${{ steps.info.outputs.script_name }}
          
          # Create a temporary staging area for the zip to include a root folder
          mkdir -p "package/$SCRIPT_NAME"
          
          # Package logic: Exclude source files, include built assets, exclude internal dev files
          rsync -av \
            --exclude='.*' \
            --exclude='/dist' \
            --exclude='/package' \
            --exclude='node_modules' \
            --exclude='web/src' \
            --exclude='web/public' \
            --exclude='web/tsconfig*' \
            --exclude='web/vite.config*' \
            --exclude='web/eslint*' \
            --exclude='web/package.json' \
            --exclude='web/package-lock.json' \
            --exclude='.github/' \
            --exclude='.luacheckrc' \
            --exclude='.gitattributes' \
            --exclude='.gitignore' \
            --exclude='*.py' \
            ./ "package/$SCRIPT_NAME/"
          
          # Plug-and-Play Config Handling
          find "package/$SCRIPT_NAME" -name "*.dist.lua" | while read dist_file; do
            lua_file="${dist_file%.dist.lua}.lua"
            if [ ! -f "$lua_file" ]; then
              cp "$dist_file" "$lua_file"
              echo "Created $lua_file from $dist_file for distribution."
            fi
            rm "$dist_file"
          done

          cd package && zip -r "../${SCRIPT_NAME}-v${VERSION}.zip" "$SCRIPT_NAME" && cd ..

      - name: Upload production artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: "*.zip"
          retention-days: 7

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.info.outputs.version }}
          name: v${{ steps.info.outputs.version }}
          body_path: release_notes.txt
          files: |
            *.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          VERSION: ${{ steps.info.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'EOF'
          import json, os, urllib.request, re
          webhook = os.environ.get('DISCORD_WEBHOOK_URL', '')
          if not webhook:
              print("No Discord webhook URL found. Skipping notification.")
              exit(0)
          
          # Try to get a clean display name from fxmanifest
          display_name = os.environ['REPO'].split('/')[-1]
          if os.path.exists('fxmanifest.lua'):
              with open('fxmanifest.lua', 'r') as f:
                  m = re.search(r"name\s+['\"]([^'\"]+)['\"]", f.read())
                  if m: display_name = m.group(1)

          notes_path = 'release_notes.txt'
          notes = ""
          if os.path.exists(notes_path):
              with open(notes_path, 'r', encoding='utf-8', errors='ignore') as f:
                  notes = f.read().strip()
          
          if len(notes) > 1900:
              notes = notes[:1890] + "\n... (notes truncated)"
          
          payload = {
              "username": display_name,
              "embeds": [{
                  "title": f"📦 {display_name} v{os.environ['VERSION']}",
                  "description": notes or "A new version has been released!",
                  "color": 3066993,
                  "footer": {"text": "v" + os.environ['VERSION'] + " • Automated Release"}
              }]
          }
          
          req = urllib.request.Request(webhook, data=json.dumps(payload).encode('utf-8'), 
                                     headers={'Content-Type': 'application/json'}, method='POST')
          try:
              with urllib.request.urlopen(req) as resp: pass
          except Exception as e: print(f"Error notifying Discord: {e}")
          EOF
