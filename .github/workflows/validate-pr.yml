name: Validate PR

on:
  pull_request:
    branches: [main, staging, develop]
    types: [opened, edited, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check GH_PAT Configuration
        shell: bash
        run: |
          if [ -z "${{ secrets.GH_PAT }}" ]; then
            echo "::warning title=Missing GH_PAT::The GH_PAT secret is not set. Automated branch synchronization will fail after merge."
            echo "HAS_PAT=false" >> $GITHUB_ENV
          else
            echo "HAS_PAT=true" >> $GITHUB_ENV
          fi

      - name: Sync FiveM Natives (Automated Definitions)
        run: python3 .github/scripts/sync_natives.py

      - name: Run Luacheck
        uses: lunarmodules/luacheck-action@v1
        with:
          args: '. --no-color --codes --formatter plain'

      - name: Validate NUI Build
        run: |
          if [ -f "web/package.json" ]; then
            echo "Validating NUI build (Strict mode)..."
            cd web
            npm ci
            npm run build
          else
            echo "No NUI found, skipping validation."
          fi

      - name: Run Config Sync Check
        run: python3 .github/scripts/check_config_sync.py

      - name: Validate PR Body
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          TARGET_BRANCH: ${{ github.base_ref }}
        run: |
          python3 << 'EOF'
          import os, re, sys, subprocess

          def get_manifest_version(branch='HEAD'):
              try:
                  cmd = ['git', 'show', f'{branch}:fxmanifest.lua']
                  content = subprocess.check_output(cmd, stderr=subprocess.STDOUT).decode('utf-8')
                  match = re.search(r"^\s*version\s+['\"]([^'\"]*)['\"]", content, re.M)
                  return match.group(1) if match else "0.0.0"
              except: return "0.0.0"

          def is_higher(new, old):
              try:
                  n = [int(x) for x in new.split('.')]
                  o = [int(x) for x in old.split('.')]
                  while len(n) < 3: n.append(0)
                  while len(o) < 3: o.append(0)
                  return n > o
              except: return False

          body = os.environ.get('PR_BODY', '')
          target = os.environ.get('TARGET_BRANCH', '')
          
          current_v = get_manifest_version('origin/main')
          if current_v == "0.0.0": current_v = get_manifest_version('HEAD')

          c_regex = r'## Changelog\s*\n(.*?)(?=\n## |\Z)'
          c_match = re.search(c_regex, body, re.DOTALL)
          if not c_match:
              print("❌ Error: All PRs must include a '## Changelog' section.")
              sys.exit(1)
          
          content = re.sub(r'<!--.*?-->', '', c_match.group(1), flags=re.DOTALL).strip()
          if not content or content.lower() == 'none' or content == '- ...':
              print("❌ Error: The '## Changelog' section cannot be empty.")
              sys.exit(1)

          if target == 'main':
              v_regex = r'(?m)^[*-]?\s*VERSION:\s*[vV]?(\d+\.\d+\.\d+)'
              v_match = re.search(v_regex, body)
              
              if not v_match:
                  print("❌ Error: Release PRs to 'main' must specify a version.")
                  sys.exit(1)
              
              new_v = v_match.group(1).strip()
              if not is_higher(new_v, current_v):
                  print(f"❌ Error: Version ({new_v}) must be higher than production ({current_v}).")
                  sys.exit(1)
              
          print("✅ PR body validation successful")
          EOF

      - name: 🚨 Handle Failure (Label & Comment)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo, number } = context.issue;
            
            // Add Label
            try {
              await github.rest.issues.addLabels({
                owner, repo, issue_number: number,
                labels: ['FAILED VALIDATION']
              });
            } catch (e) { console.log("Label error:", e); }

            // Post Comment
            const message = `## ❌ PR VALIDATION FAILED 🚨\n\n**Warning:** Some checks in the pipeline have failed. Merging this PR will likely break the production or staging builds.\n\n### Potential issues:\n- **Luacheck:** Check for Lua syntax or global errors.\n- **NUI Build:** Check if \`npm ci\` or \`npm run build\` failed.\n- **Config Sync:** A \`.lua\` and \`.dist.lua\` file are out of sync or a key is missing.\n- **Version Check:** The version must be higher for production releases.\n\n**Action Required:** Please fix the errors above before merging.`;
            github.rest.issues.createComment({
              owner, repo, issue_number: number,
              body: message
            });

      - name: ✨ Handle Success (Remove Label)
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo, number } = context.issue;
            try {
              await github.rest.issues.removeLabel({
                owner, repo, issue_number: number,
                name: 'FAILED VALIDATION'
              });
            } catch (e) { /* Ignore if label doesn't exist */ }
