name: Validate PR

on:
  pull_request:
    branches: [main, staging, develop]
    types: [opened, edited, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check GH_PAT Configuration
        shell: bash
        run: |
          if [ -z "${{ secrets.GH_PAT }}" ]; then
            echo "::warning title=Missing GH_PAT::The GH_PAT secret is not set. Automated branch synchronization will fail after merge."
            echo "HAS_PAT=false" >> $GITHUB_ENV
          else
            echo "HAS_PAT=true" >> $GITHUB_ENV
          fi

      - name: Sync Global Standards (Natives)
        run: |
          echo "[*] Fetching latest FiveM Natives..."
          curl -sSfL "https://raw.githubusercontent.com/ZAWAPPS/fivem-script-template/main/.natives.lua" -o .natives.lua

      - name: Run Luacheck
        id: luacheck
        continue-on-error: true
        run: |
          sudo apt-get update
          sudo apt-get install -y lua-check
          curl -sSfL "https://raw.githubusercontent.com/ZAWAPPS/fivem-script-template/main/.luacheckrc" -o .luacheckrc_remote
          luacheck . --config .luacheckrc_remote --no-color --codes --formatter plain > report.txt

      - name: Show Luacheck Report
        if: always()
        run: |
          if [ -f report.txt ]; then
            echo "### Luacheck Report Summary ###"
            cat report.txt
          else
            echo "No Luacheck report found."
          fi

      - name: Validate NUI Build
        run: |
          if [ -f "web/package.json" ]; then
            echo "Validating NUI build..."
            cd web
            npm ci || npm install
            npm run build
          else
            echo "No NUI found, skipping validation."
          fi

      - name: Run Config Sync Check
        run: python3 .github/scripts/check_config_sync.py

      - name: Validate PR Body
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          TARGET_BRANCH: ${{ github.base_ref }}
          SOURCE_BRANCH: ${{ github.head_ref }}
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'EOF'
          import os, re, sys, subprocess, json

          def get_manifest_version(branch='HEAD'):
              try:
                  cmd = ['git', 'show', f'{branch}:fxmanifest.lua']   
                  content = subprocess.check_output(cmd, stderr=subprocess.STDOUT).decode('utf-8')
                  match = re.search(r"^\s*version\s+['\"]([^'\"]*)['\"]", content, re.M)
                  return match.group(1) if match else "0.0.0"
              except: return "0.0.0"

          def is_higher(new, old):
              try:
                  n = [int(x) for x in new.split('.')]
                  o = [int(x) for x in old.split('.')]
                  while len(n) < 3: n.append(0)
                  while len(o) < 3: o.append(0)
                  return n > o
              except: return False

          def get_recent_prs():
              try:
                  cmd = ['git', 'describe', '--tags', '--abbrev=0']
                  tag = subprocess.check_output(cmd, stderr=subprocess.STDOUT).decode('utf-8').strip()
              except:
                  tag = subprocess.check_output(['git', 'rev-list', '--max-parents=0', 'HEAD']).decode('utf-8').strip()

              all_prs = []
              for base in ['develop', 'staging']:
                  cmd = ['gh', 'pr', 'list', '--state', 'merged', '--base', base, '--limit', '20', '--json', 'number,title,body']
                  res = subprocess.check_output(cmd).decode('utf-8')
                  all_prs.extend(json.loads(res))
              return all_prs

          body = os.environ.get('PR_BODY', '')
          target = os.environ.get('TARGET_BRANCH', '')
          source = os.environ.get('SOURCE_BRANCH', '')

          c_regex = r'## Changelog\s*\n(.*?)(?=\n## |\Z)'
          c_match = re.search(c_regex, body, re.DOTALL)

          if not c_match:
              print("❌ Error: All PRs must include a '## Changelog' section.")
              sys.exit(1)

          content = re.sub(r'<!--.*?-->', '', c_match.group(1), flags=re.DOTALL).strip()
          is_empty = not content or content.lower() == 'none' or content == '- ...'

          # RULE: If merging develop to staging or staging to main, we allow 'None' 
          # IF there are other PRs that already provide the history.
          if (target == 'staging' and source == 'develop') or (target == 'main' and source == 'staging'):
              if is_empty:
                  recent = get_recent_prs()
                  if not recent:
                      print(f"❌ Error: This sync PR ({source} -> {target}) has no unique changelog AND no recent feature PRs were found. Please provide a summary of your direct-to-branch changes.")
                      sys.exit(1)
                  else:
                      print(f"✅ Sync PR: Found {len(recent)} recent child PRs. Minimal changelog accepted.")
          elif is_empty:
              print(f"❌ Error: The '## Changelog' section cannot be empty for {source} -> {target} PRs.")
              sys.exit(1)

          if target == 'main':
              current_v = get_manifest_version('origin/main')
              if current_v == "0.0.0": current_v = get_manifest_version('HEAD')

              v_regex = r'(?m)^[*-]?\s*VERSION:\s*[vV]?(\d+\.\d+\.\d+)'
              v_match = re.search(v_regex, body)

              if not v_match:
                  print("❌ Error: Release PRs to 'main' must specify a version (e.g. VERSION: 1.0.1).")
                  sys.exit(1)

              new_v = v_match.group(1).strip()
              if not is_higher(new_v, current_v):
                  print(f"❌ Error: Version ({new_v}) must be higher than production ({current_v}).")
                  sys.exit(1)

          print("✅ PR body validation successful")
          EOF
      - name: 💬 Post Luacheck Findings
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo, number } = context.issue;
            const fs = require('fs');
            
            if (fs.existsSync('report.txt')) {
                let report = fs.readFileSync('report.txt', 'utf8').trim();
                // Check if the report contains actual findings (more than just "0 errors / 0 warnings")
                const hasFindings = report.split('\n').some(line => {
                    const l = line.toLowerCase();
                    return (l.includes('warning') || l.includes('error')) && !l.includes('0 warnings') && !l.includes('0 errors');
                }) || (report.length > 0 && !report.includes('0 warnings') && !report.includes('0 errors'));

                if (hasFindings) {
                    if (report.length > 3000) report = report.substring(0, 3000) + "... (truncated)";
                    const message = `## ⚠️ Luacheck Findings\n\nThese findings are **non-blocking** but should be reviewed for code quality:\n\n\`\`\`\n${report}\n\`\`\``;
                    await github.rest.issues.createComment({
                      owner, repo, issue_number: number,
                      body: message
                    });
                }
            }

      - name: 🚨 Handle Failure (Label & Comment)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo, number } = context.issue;
            
            // Add Label
            try {
              await github.rest.issues.addLabels({
                owner, repo, issue_number: number,
                labels: ['FAILED VALIDATION']
              });
            } catch (e) { console.log("Label error:", e); }

            const message = `## ❌ PR VALIDATION FAILED 🚨\n\n**Warning:** Some CRITICAL checks in the pipeline have failed. Merging this PR will likely break the production or staging builds.\n\n### Potential issues:\n- **NUI Build:** Check if \`npm ci\` or \`npm run build\` failed.\n- **Config Sync:** A \`.lua\` and \`.dist.lua\` file are out of sync or a key is missing.\n- **Version Check:** The version must be higher for production releases.\n\n**Action Required:** Please fix the critical errors above before merging.`;

            await github.rest.issues.createComment({
              owner, repo, issue_number: number,
              body: message
            });

      - name: ✨ Handle Success (Remove Label)
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo, number } = context.issue;

            try {
              await github.rest.issues.removeLabel({
                owner, repo, issue_number: number,
                name: 'FAILED VALIDATION'
              });
            } catch (e) { /* Ignore if label doesn't exist */ }
