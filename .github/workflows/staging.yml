name: Staging Build

on:
  pull_request:
    types: [closed]
    branches: [staging]
  workflow_dispatch:

jobs:
  staging-build:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract info
        id: info
        env:
          PR_BODY: "${{ github.event.pull_request.body || 'VERSION: 1.0.0' }}"
        run: |
          # Flexible Regex for SemVer (X.Y.Z) from PR body
          VERSION=$(echo "$PR_BODY" | grep -ioP '(?m)^[*-]?\s*VERSION\s*:\s*[vV]?\K\d+\.\d+\.\d+' | head -1)
          if [ -z "$VERSION" ]; then
            VERSION="staging-$(date +'%Y%m%d%H%M')"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          # Quote-agnostic SCRIPT_NAME extraction
          SCRIPT_NAME=$(grep -ioP "name\s+['\"]\K[^'\"]+" fxmanifest.lua | head -1 | tr ' ' '-')
          [ -z "$SCRIPT_NAME" ] && SCRIPT_NAME=${{ github.event.repository.name }}
          echo "script_name=$SCRIPT_NAME" >> $GITHUB_OUTPUT

          # Extract changelog for Discord notification
          python3 << 'EOF'
          import os, re
          body = os.environ.get('PR_BODY', '')
          match = re.search(r'## Changelog\s*\n(.*?)(?=\n## |\Z)', body, re.DOTALL)
          if match:
              # Remove HTML comments (<!-- ... -->)
              notes = re.sub(r'<!--.*?-->', '', match.group(1), flags=re.DOTALL).strip()
          else:
              notes = "No changelog provided."
          with open('staging_notes.txt', 'w') as f: f.write(notes)
          EOF

      - name: Build NUI
        run: |
          if [ -f "web/package.json" ]; then
            echo "Building NUI..."
            cd web
            npm ci || npm install
            npm run build
          else
            echo "No NUI found, skipping build."
          fi

      - name: Package Resource
        run: |
          SCRIPT_NAME=${{ steps.info.outputs.script_name }}
          STAGING_VER="${{ steps.info.outputs.version }}-staging"
          
          mkdir -p "package/$SCRIPT_NAME"
          rsync -av \
            --exclude='.*' \
            --exclude='/dist' \
            --exclude='/package' \
            --exclude='node_modules' \
            --exclude='web/src' \
            --exclude='web/public' \
            --exclude='web/tsconfig*' \
            --exclude='web/vite.config*' \
            --exclude='web/eslint*' \
            --exclude='web/package.json' \
            --exclude='web/package-lock.json' \
            --exclude='.github/' \
            --exclude='*.py' \
            ./ "package/$SCRIPT_NAME/"
          
          # Plug-and-Play Config: Ensure a config.lua exists for internal testing
          find "package/$SCRIPT_NAME" -name "*.dist.lua" | while read dist_file; do
            lua_file="${dist_file%.dist.lua}.lua"
            if [ ! -f "$lua_file" ]; then
              cp "$dist_file" "$lua_file"
              echo "Created $lua_file from $dist_file for internal testing."
            fi
            rm "$dist_file"
          done
          
          # Update version in manifest for staging identification (quote agnostic)
          sed -i -E "s/^([[:space:]]*version[[:space:]]+)(['\"])[^'\"]*(['\"])/\1\2$STAGING_VER\3/" "package/$SCRIPT_NAME/fxmanifest.lua"
          
      - name: Package zip
        run: |
          VERSION=${{ steps.info.outputs.version }}
          SCRIPT_NAME=${{ steps.info.outputs.script_name }}
          cd package && zip -r "../${SCRIPT_NAME}-v${VERSION}-staging.zip" "$SCRIPT_NAME" && cd ..

      - name: Upload staging artifact
        uses: actions/upload-artifact@v4
        with:
          name: staging-build
          path: "*.zip"
          retention-days: 3

      - name: Notify Discord staging
        env:
          DISCORD_STAGING_WEBHOOK_URL: ${{ secrets.DISCORD_STAGING_WEBHOOK_URL }}
          VERSION: ${{ steps.info.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'EOF'
          import json, os, urllib.request, re
          webhook = os.environ.get('DISCORD_STAGING_WEBHOOK_URL', '')
          if not webhook: exit(0)
          
          repo_name = os.environ['REPO'].split('/')[-1]
          display_name = repo_name # Default
          if os.path.exists('fxmanifest.lua'):
              with open('fxmanifest.lua', 'r') as f:
                  m = re.search(r"name\s+['\"]([^'\"]+)['\"]", f.read())
                  if m: 
                      repo_name = m.group(1)
                      display_name = m.group(1)

          notes = "New internal build ready for testing."
          if os.path.exists('staging_notes.txt'):
              with open('staging_notes.txt', 'r') as f:
                  notes = f.read().strip()
          
          if len(notes) > 1500: notes = notes[:1490] + "..."

          payload = {
              "username": display_name,
              "embeds": [{
                  "title": f"🔧 Staging Build: {repo_name}",
                  "description": f"**Version:** v{os.environ['VERSION']}\n\n**Changes:**\n{notes}",
                  "color": 15844367,
                  "footer": {"text": "Automated Staging Build"}
              }]
          }
          
          headers = {
              'Content-Type': 'application/json',
              'User-Agent': 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/112.0.0.0 Safari/537.36'
          }
          req = urllib.request.Request(webhook, data=json.dumps(payload).encode('utf-8'), 
                                     headers=headers, method='POST')
          try:
              with urllib.request.urlopen(req) as resp: pass
          except Exception as e: print(f"Error notifying Discord: {e}")
          EOF
